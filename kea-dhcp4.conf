{
   "Dhcp4": {
      // Interfacce su cui il server DHCP è in ascolto: LAN client Linux e rete Windows/AD/DC
      "interfaces-config": {
        "interfaces": [ "enp0s8", "enp0s9" ]
      },

      // Durata del lease DHCP in secondi (~66 minuti)
      "valid-lifetime": 4000,

      "subnet4": [
        {
          "id": 1,
          // Subnet LAN client Linux
          "subnet": "10.0.10.0/24",
          // Pool di indirizzi assegnabili ai client
          "pools": [
           { "pool": "10.0.10.100-10.0.10.200" }
          ],
          "option-data": [
           {
             // Gateway della subnet
             "name": "routers",
             "data": "10.0.10.1"
           },
           { 
             // Rotta statica verso la rete WireGuard 10.0.8.0/24 via 10.0.10.1 (in formato esadecimale raw)
             "name": "classless-static-route",
             "data": "180a08000a000a01",
             "csv-format": false
           },
           {
             // DNS: punta al DC Windows
             "name": "domain-name-servers",
             "data": "10.0.20.100"
            }
          ]
        },

        {
           "id": 2,
           // Subnet rete Windows/AD/DC
           "subnet": "10.0.20.0/24",
           // Pool di indirizzi assegnabili ai client
           "pools": [
             { "pool": "10.0.20.100-10.0.20.200" }
           ],
           "option-data": [
            {
              // Gateway della subnet
              "name": "routers",
              "data": "10.0.20.1"
            },
            {
              // Rotta statica verso la rete WireGuard 10.0.8.0/24 via 10.0.20.1 (in formato esadecimale raw)
              "name": "classless-static-route",
              "data": "180a08000a001401",
              "csv-format": false
            },
            {
              // DNS: punta al server DC Windows
              "name": "domain-name-servers",
              "data": "10.0.20.100"
            }
           ]
         }
       ]
     }
}
